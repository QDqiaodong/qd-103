services:
  frontend:
    image: docker.m.daocloud.io/library/node:18-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - survey-network

  backend:
    image: survey-platform-backend:latest
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - survey-network

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge

volumes:
  frontend_node_modules:
