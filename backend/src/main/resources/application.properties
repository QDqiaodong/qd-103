spring.application.name=survey-platform

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/survey_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:survey_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:survey_pass_123}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=60000

# Server
server.port=${SERVER_PORT:8080}

# CORS
spring.web.cors.allowed-origins=*

# 问卷截止巡检与状态纠偏
# 默认每5分钟执行一次，cron表达式：秒 分 时 日 月 周
survey.deadline-inspect.cron=0 */5 * * * *

# 分时段提交限流配置
# 全局限流窗口大小（秒）
survey.rate-limit.global-window-seconds=60
# 刚发布期 - 全局限流（次/窗口）
survey.rate-limit.global-limit-just-released=300
# 高峰冲刺期 - 全局限流（次/窗口）
survey.rate-limit.global-limit-peak=200
# 临近截止期 - 全局限流（次/窗口）
survey.rate-limit.global-limit-near-deadline=100

# IP限流窗口大小（秒）
survey.rate-limit.ip-window-seconds=60
# 刚发布期 - IP限流（次/窗口）
survey.rate-limit.ip-limit-just-released=30
# 高峰冲刺期 - IP限流（次/窗口）
survey.rate-limit.ip-limit-peak=20
# 临近截止期 - IP限流（次/窗口）
survey.rate-limit.ip-limit-near-deadline=10

# 异常冲量检测
# 冲量检测窗口大小（秒）
survey.rate-limit.surge-detection-window-seconds=10
# 冲量阈值倍数（相对于正常流量的倍数）
survey.rate-limit.surge-threshold-multiplier=2.5
# 冲量发生时的收紧比例（0-1，越小越紧）
survey.rate-limit.surge-tighten-ratio=0.4
