spring.application.name=survey-platform

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/survey_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:survey_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:survey_pass_123}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=60000

# Server
server.port=${SERVER_PORT:8080}

# CORS
spring.web.cors.allowed-origins=*

# 问卷截止巡检与状态纠偏
# 默认每5分钟执行一次，cron表达式：秒 分 时 日 月 周
survey.deadline-inspect.cron=0 */5 * * * *
