spring.application.name=survey-platform-test

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis - 测试中使用 Mock
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Server
server.port=8081

# 限流配置（测试用，较小的阈值方便测试）
survey.rate-limit.global-window-seconds=60
survey.rate-limit.global-limit-just-released=100
survey.rate-limit.global-limit-peak=50
survey.rate-limit.global-limit-near-deadline=20

survey.rate-limit.ip-window-seconds=60
survey.rate-limit.ip-limit-just-released=20
survey.rate-limit.ip-limit-peak=10
survey.rate-limit.ip-limit-near-deadline=5

survey.rate-limit.surge-detection-window-seconds=10
survey.rate-limit.surge-threshold-multiplier=1.5
survey.rate-limit.surge-tighten-ratio=0.4
