services:
  frontend:
    image: survey-platform-frontend:latest
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}
    ports:
      - "${FRONTEND_PORT:-18083}:80"
    depends_on:
      - backend
    networks:
      - survey-network

  backend:
    image: survey-platform-backend:latest
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - survey-network

  redis:
    image: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}/redis:7-alpine
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge
