services:
  frontend:
    image: survey-platform-frontend:latest
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}
    ports:
      - "${FRONTEND_PORT:-18183}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - survey-network

  backend:
    image: survey-platform-backend:latest
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
    ports:
      - "${BACKEND_PORT:-18184}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - survey-network

  mysql:
    image: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}/mysql:8.0.41
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-survey_platform}
      MYSQL_USER: ${MYSQL_USER:-survey_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-survey_pass_123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-survey_root_pass_123}
    ports:
      - "${MYSQL_PORT:-13316}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - survey-network

  redis:
    image: ${DOCKER_REGISTRY:-docker.m.daocloud.io/library}/redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge

volumes:
  mysql-data:
